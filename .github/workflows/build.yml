name: Build Executables

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --windowed --onefile --name PageCounter src/page_counter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PageCounter-Windows
          path: dist/PageCounter.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --windowed --name PageCounter src/page_counter.py

      - name: Zip app
        run: cd dist && zip -r PageCounter_macOS.zip PageCounter.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PageCounter-macOS
          path: dist/PageCounter_macOS.zip
